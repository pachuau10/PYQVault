<div class="pdf-upload-widget">
  <input type="file" accept=".pdf,application/pdf" class="pdf-file-input"
         data-upload-url="{{ upload_url }}" data-field-id="{{ attrs.id }}">
  {% if current_name %}
  <p style="margin:6px 0 0;font-size:12px;color:#666">
    Current: <code>{{ current_name }}</code>
  </p>
  {% endif %}
  <div class="pdf-upload-progress" style="display:none;margin:6px 0">
    <progress value="0" max="100" style="width:100%;height:6px;border-radius:3px"></progress>
    <span class="pdf-upload-status" style="font-size:12px;margin-left:4px"></span>
  </div>
  <input type="hidden" name="{{ name }}" id="{{ attrs.id }}" value="{{ value|default:'' }}">
</div>
