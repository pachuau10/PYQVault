<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">PYQNest App Icon</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A premium app icon with a white document resting in an emerald nest on a deep navy gradient background, with a green download badge</desc>

  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0F1E3D"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="nestGlow" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="5%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="nestStroke1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="nestStroke2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0EA5A0"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="docShadow" x="-20%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000820" flood-opacity="0.45"/>
    </filter>
    <filter id="badgeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="nestShadow" x="-15%" y="-30%" width="130%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000820" flood-opacity="0.5"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="40" y="40" width="600" height="600" rx="135" ry="135"/>
    </clipPath>
  </defs>

  <!-- === ICON BACKGROUND === -->
  <rect x="40" y="40" width="600" height="600" rx="135" ry="135" fill="url(#bgGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Glow behind nest -->
  <ellipse cx="340" cy="480" rx="240" ry="110" fill="url(#nestGlow)" clip-path="url(#iconClip)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- === NEST === -->
  <!-- Nest: layered arc ribbons forming a cup shape, drawn back to front -->
  <g filter="url(#nestShadow)" clip-path="url(#iconClip)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Outermost back arc - darkest -->
    <path d="M148,500 Q200,570 340,578 Q480,570 532,500" fill="none" stroke="#0A6E5A" stroke-width="18" stroke-linecap="round" opacity="0.7" style="fill:none;stroke:rgb(10, 110, 90);color:rgb(255, 255, 255);stroke-width:18px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Back arc 2 -->
    <path d="M155,488 Q210,562 340,570 Q470,562 525,488" fill="none" stroke="#0D8F72" stroke-width="16" stroke-linecap="round" opacity="0.8" style="fill:none;stroke:rgb(13, 143, 114);color:rgb(255, 255, 255);stroke-width:16px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Woven cross strands back -->
    <path d="M170,455 Q220,555 340,565 Q460,555 510,455" fill="none" stroke="#0EA47F" stroke-width="14" stroke-linecap="round" opacity="0.75" style="fill:none;stroke:rgb(14, 164, 127);color:rgb(255, 255, 255);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.75;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M178,445 Q235,548 340,558 Q445,548 502,445" fill="none" stroke="#0FB88E" stroke-width="13" stroke-linecap="round" opacity="0.8" style="fill:none;stroke:rgb(15, 184, 142);color:rgb(255, 255, 255);stroke-width:13px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Middle depth strands -->
    <path d="M188,436 Q248,538 340,548 Q432,538 492,436" fill="none" stroke="url(#nestStroke2)" stroke-width="13" stroke-linecap="round" opacity="0.85" style="fill:none;color:rgb(255, 255, 255);stroke-width:13px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M198,428 Q260,528 340,540 Q420,528 482,428" fill="none" stroke="url(#nestStroke1)" stroke-width="14" stroke-linecap="round" style="fill:none;color:rgb(255, 255, 255);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Front mid strands -->
    <path d="M210,422 Q272,518 340,530 Q408,518 470,422" fill="none" stroke="#12C9A0" stroke-width="15" stroke-linecap="round" style="fill:none;stroke:rgb(18, 201, 160);color:rgb(255, 255, 255);stroke-width:15px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M222,418 Q282,510 340,522 Q398,510 458,418" fill="none" stroke="#10B981" stroke-width="16" stroke-linecap="round" style="fill:none;stroke:rgb(16, 185, 129);color:rgb(255, 255, 255);stroke-width:16px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Foremost bright arc -->
    <path d="M238,415 Q295,500 340,514 Q385,500 442,415" fill="none" stroke="#14B8A6" stroke-width="15" stroke-linecap="round" opacity="0.9" style="fill:none;stroke:rgb(20, 184, 166);color:rgb(255, 255, 255);stroke-width:15px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Highlight rim -->
    <path d="M252,412 Q305,495 340,508 Q375,495 428,412" fill="none" stroke="#5EEAD4" stroke-width="6" stroke-linecap="round" opacity="0.5" style="fill:none;stroke:rgb(94, 234, 212);color:rgb(255, 255, 255);stroke-width:6px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Left side wall of nest -->
    <path d="M148,500 Q145,468 165,440 Q178,425 210,418" fill="none" stroke="#0D8F72" stroke-width="16" stroke-linecap="round" opacity="0.75" style="fill:none;stroke:rgb(13, 143, 114);color:rgb(255, 255, 255);stroke-width:16px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.75;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M158,492 Q155,462 174,436 Q185,423 218,416" fill="none" stroke="url(#nestStroke1)" stroke-width="14" stroke-linecap="round" opacity="0.8" style="fill:none;color:rgb(255, 255, 255);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Right side wall of nest -->
    <path d="M532,500 Q535,468 515,440 Q502,425 470,418" fill="none" stroke="#0D8F72" stroke-width="16" stroke-linecap="round" opacity="0.75" style="fill:none;stroke:rgb(13, 143, 114);color:rgb(255, 255, 255);stroke-width:16px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.75;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M522,492 Q525,462 506,436 Q495,423 462,416" fill="none" stroke="url(#nestStroke1)" stroke-width="14" stroke-linecap="round" opacity="0.8" style="fill:none;color:rgb(255, 255, 255);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:0.8;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- === DOCUMENT === -->
  <g filter="url(#docShadow)" clip-path="url(#iconClip)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Document body -->
    <path d="M241,185 L241,480 Q241,492 253,492 L427,492 Q439,492 439,480 L439,215 L409,185 Z" fill="url(#docGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Folded corner -->
    <path d="M409,185 L409,215 L439,215 Z" fill="#C7D2E8" style="fill:rgb(199, 210, 232);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Subtle fold crease -->
    <path d="M409,185 L439,215" fill="none" stroke="#A8B4CC" stroke-width="1.5" style="fill:none;stroke:rgb(168, 180, 204);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Document lines - subtle -->
    <line x1="266" y1="248" x2="414" y2="248" stroke="#D1D8E8" stroke-width="6" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(209, 216, 232);color:rgb(255, 255, 255);stroke-width:6px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="266" y1="278" x2="414" y2="278" stroke="#D1D8E8" stroke-width="6" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(209, 216, 232);color:rgb(255, 255, 255);stroke-width:6px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="266" y1="308" x2="414" y2="308" stroke="#D1D8E8" stroke-width="6" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(209, 216, 232);color:rgb(255, 255, 255);stroke-width:6px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="266" y1="338" x2="380" y2="338" stroke="#D1D8E8" stroke-width="6" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(209, 216, 232);color:rgb(255, 255, 255);stroke-width:6px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="266" y1="374" x2="414" y2="374" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(226, 232, 240);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="266" y1="396" x2="395" y2="396" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(226, 232, 240);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="266" y1="418" x2="350" y2="418" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(226, 232, 240);color:rgb(255, 255, 255);stroke-width:4px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- === DOWNLOAD BADGE === -->
  <g filter="url(#badgeShadow)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Badge circle -->
    <circle cx="416" cy="458" r="48" fill="url(#badgeGrad)" style="stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Badge ring highlight -->
    <circle cx="416" cy="458" r="48" fill="none" stroke="#5EEAD4" stroke-width="2" opacity="0.45" style="fill:none;stroke:rgb(94, 234, 212);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.45;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Download arrow icon -->
    <!-- Vertical shaft -->
    <line x1="416" y1="432" x2="416" y2="463" stroke="white" stroke-width="6.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(255, 255, 255);color:rgb(255, 255, 255);stroke-width:6.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Arrow head -->
    <polyline points="399,452 416,472 433,452" fill="none" stroke="white" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(255, 255, 255);stroke-width:6.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Base line -->
    <line x1="399" y1="480" x2="433" y2="480" stroke="white" stroke-width="6.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(255, 255, 255);color:rgb(255, 255, 255);stroke-width:6.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

  <!-- Icon rounded frame border (subtle premium shine) -->
  <rect x="40" y="40" width="600" height="600" rx="135" ry="135" fill="none" stroke="#1E3A5F" stroke-width="2.5" opacity="0.6" style="fill:none;stroke:rgb(30, 58, 95);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

</svg>